<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trabajá con nosotros | Dominio Inmobiliaria</title>
    <meta name="description" content="Sumate al equipo de Dominio Inmobiliaria. Envianos tu CV y formá parte de nuestra familia. Trabajá en el rubro inmobiliario en Paraná, Entre Ríos.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Dominio Inmobiliaria">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Trabajá con nosotros | Dominio Inmobiliaria">
    <meta property="og:description" content="Sumate al equipo de Dominio Inmobiliaria. Envianos tu CV y formá parte de nuestra familia.">
    <meta property="og:image" content="../assest/logo-inmo.webp">
    <meta property="og:url" content="https://www.dominioinmobiliaria.com/pages/trabajaconnosotros.html">
    <meta property="og:locale" content="es_AR">

    <link rel="canonical" href="https://www.dominioinmobiliaria.com/pages/trabajaconnosotros.html">

    <link rel="icon" type="image/webp" href="../assest/logo-inmo.webp">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos.css">
</head>

<body>

<header>   
    <div class="logo">
        <h1>Dominio Inmobiliaria</h1>
        <a href="../index.html" class="logotipo" aria-label="Ir al inicio de Dominio Inmobiliaria">  
            <img 
                src="../assest/logo-inmo.webp" 
                alt="Logo de Dominio Inmobiliaria"
                title="Dominio Inmobiliaria"
                width="120"
                loading="eager"
            >
        </a> 
    </div>
    
    <nav aria-label="Menú principal">
        <ul>
            <li class="li"><a href="../index.html">Inicio</a></li>
            <li class="li"><a href="ventas.html">Venta</a></li>
            <li class="li"><a href="alquiler.html">Alquilar</a></li>
            <li class="li"><a href="trabajaconnosotros.html" aria-current="page">Trabajá con nosotros</a></li>
            <li class="li"><a href="contactos.html">Contactanos</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="trabaja-con-nosotros" aria-label="Formulario de postulación">
        <form class="container mt-5 mb-5 bg-light p-4 rounded">
            <h2 class="text-center mb-4">Trabajá con nosotros</h2>

            <p class="text-center mb-4">
                Vos también podés ser parte de esta gran familia.
            </p>

            <p class="mb-4">¡Dejanos tu contacto y tu CV!</p>
            
            <div class="mb-3">
                <label class="form-label" for="nombre">Nombre y apellido</label>
                <input type="text" id="nombre" class="form-control" placeholder="Nombre completo" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="info">Información tuya</label>
                <textarea id="info" class="form-control" rows="4" placeholder="Contanos sobre vos"></textarea>
            </div>
            
            <div class="mb-4">
                <h3>Dejá tu CV acá</h3>
                <input class="form-control form-control-lg" type="file" accept=".pdf,.doc,.docx" aria-label="Subir CV">
            </div>
            
            <button type="submit" class="btn-formulario w-100">
                Enviar
            </button>
        </form>
    </section>
</main>

<footer>
    <p>
        Contactanos en dominioinmob@gmail.com <br>
        © 2025 Dominio Inmobiliaria
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
